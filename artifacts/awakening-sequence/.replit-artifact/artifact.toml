kind = "web"
previewPath = "/"
title = "The Awakening Sequence"
version = "1.0.0"
id = "artifacts/awakening-sequence"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25528

[services.development]
run = "pnpm --filter @workspace/awakening-sequence run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/awakening-sequence", "run", "build" ]
publicDir = "artifacts/awakening-sequence/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25528"
BASE_PATH = "/"
